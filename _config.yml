# ── THEME ─────────────────────────────────────────────────
theme: jekyll-theme-chirpy

# ── SITE INFO ─────────────────────────────────────────────
title:       PpairNode
tagline:     Software Engineer | Pentester
description: Blog around cybersecurity (writeups, articles) and various projects (dev, cyber, etc...).
lang:        en
url:         "https://ppairnode.github.io"
baseurl:     "/blog"

# ── AUTHOR ────────────────────────────────────────────────
github:
  username: PpairNode
twitter:
  username: PpairNode
social:
  name: PpairNode
  links:
    - https://github.com/PpairNode
    - https://twitter.com/PpairNode

# ── APPEARANCE ────────────────────────────────────────────
theme_mode:  # empty = follows system
avatar:      /assets/img/profile.png
lightbox:    false
toc:         true

# ── FEATURES ──────────────────────────────────────────────
comments:
  provider:  # disabled

pwa:
  enabled: false
  cache:
    enabled: false

paginate: 10

footer:
  chirpy: false

# ── BUILD ─────────────────────────────────────────────────
kramdown:
  footnote_backlink: "&#8617;&#xfe0e;"
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: highlight
    span:
      line_numbers: false
    block:
      line_numbers: true
      start_line: 1

collections:
  tabs:
    output: true
    sort_by: order

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      comments: true
      toc: true
      permalink: /posts/:title/
  - scope:
      path: _drafts
    values:
      comments: false
  - scope:
      path: ""
      type: tabs
    values:
      layout: page
      permalink: /:title/

sass:
  style: compressed

compress_html:
  clippings: all
  comments:  all
  endings:   all
  profile:   false
  blanklines: false
  ignore:
    envs: [development]

exclude:
  - "*.gem"
  - "*.gemspec"
  - docs
  - tools
  - README.md
  - LICENSE
  - purgecss.js
  - "*.config.js"
  - "package*.json"

jekyll-archives:
  enabled: [categories, tags]
  layouts:
    category: category
    tag: tag
  permalinks:
    tag: /tags/:name/
    category: /categories/:name/
